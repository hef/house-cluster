---
apiVersion: v1
kind: Service
metadata:
  name: house-db-lb
  annotations:
    external-dns.alpha.kubernetes.io/hostname: house-db.${SECRET_DOMAIN:=example.com}
    io.cilium/lb-ipam-ips: 192.168.1.4
spec:
  type: LoadBalancer
  selector:
    cnpg.io/cluster: house-db
    cnpg.io/instanceRole: primary
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
