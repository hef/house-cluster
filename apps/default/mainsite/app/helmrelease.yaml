---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mainsite
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      *app :
        containers:
          server:
            image:
              repository: ghcr.io/hef/ipns-sw
              tag: 1.1.0
            env:
              TZ: ${SECRET_TZ}
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 100Mi
    service:
      app:
        ports:
          http:
            port: 80
    route:
      app:
        hostnames:
          - "${SECRET_DOMAIN:=example.com}"
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https