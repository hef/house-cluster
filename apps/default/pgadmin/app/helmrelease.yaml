---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgadmin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      pgadmin:
        containers:
          app:
            image:
              repository: docker.io/dpage/pgadmin4
              tag: "9.4"
            env:
              PGADMIN_DEFAULT_EMAIL: admin@${SECRET_DOMAIN:=example.com}
              PGADMIN_DEFAULT_PASSWORD: admin
              PGADMIN_CONFIG_SERVER_MODE: "True"
              PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 5050
        runAsGroup: 5050
        fsGroup: 5050
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 80
    route:
      app:
        hostnames:
          - pgadmin.${SECRET_DOMAIN:=example.com}
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 80
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /var/lib/pgadmin
      servers-json:
        type: configMap
        name: pgadmin-servers
        globalMounts:
          - path: /pgadmin4/servers.json
            subPath: servers.json
            readOnly: true
